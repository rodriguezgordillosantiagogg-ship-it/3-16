<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lit Killah: El Último Baile - ADSO</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Evita zoom y scroll accidental */
        }

        canvas { 
            display: block; 
        }

        /* Controles Táctiles para Celular */
        .ui-controls {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: none; /* No bloquea el canvas */
            z-index: 10;
        }

        .btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            pointer-events: auto;
            user-select: none;
            backdrop-filter: blur(5px);
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.9);
        }

        .jump-btn {
            background: rgba(163, 71, 255, 0.3); /* Un toque morado Lit Killah */
            border-color: #a347ff;
        }

        /* Mensaje de Rotación */
        #rotate-message {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: white;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        @media (orientation: portrait) {
            #rotate-message { display: flex; }
        }
    </style>
</head>
<body>

    <div id="rotate-message">
        <div style="font-size: 50px;">🔄</div>
        <h2>Gira tu celular para jugar</h2>
        <p>Lit Killah necesita espacio para el show</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-controls">
        <div style="display: flex; gap: 25px;">
            <div id="btnIzq" class="btn">◀</div>
            <div id="btnDer" class="btn">▶</div>
        </div>
        <div id="btnSalto" class="btn jump-btn">JUMP</div>
    </div>

    <audio id="audioFinal" src="mensaje_sofi.mp3"></audio>

    <script src="script.js"></script>

</body>
</html>

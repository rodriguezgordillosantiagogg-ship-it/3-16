<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lit Killah Adventure</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Pantalla de Inicio */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
        }
        button {
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background: #ffaa00; border: none; border-radius: 10px; font-weight: bold;
        }
        
        #videoContainer {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 90%; max-width: 700px;
            border: 4px solid #ffaa00; z-index: 50;
        }
        video { width: 100%; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="status">CARGANDO ASSETS...</h1>
        <button id="btnIniciar" style="display: none;">EMPEZAR SHOW 🎤</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="videoContainer">
        <video id="videoFinal"><source src="video_final.mp4" type="video/mp4"></video>
    </div>

    <audio id="audioFinal"><source src="audio_mensaje.mp3" type="audio/mpeg"></audio>

    <script src="script.js"></script>
</body>
</html>

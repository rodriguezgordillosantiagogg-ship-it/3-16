<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lit Killah: El Último Baile - ADSO</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { 
            display: block; 
            image-rendering: pixelated; /* Para que el Pixel Art se vea pro */
        }
        #videoContainer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 200; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .ui-controls { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .btn { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.2); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; pointer-events: auto; user-select: none; backdrop-filter: blur(5px); }
        .btn:active { background: rgba(255, 255, 255, 0.5); }
        #rotate-message { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; z-index: 300; flex-direction: column; align-items: center; justify-content: center; }
        @media (orientation: portrait) { #rotate-message { display: flex; } }
    </style>
</head>
<body>
    <div id="rotate-message"><h2>🔄 Gira el celular para jugar</h2></div>
    <div id="videoContainer"><video id="videoFinal"><source src="intro_final.mp4" type="video/mp4"></video></div>
    <canvas id="gameCanvas"></canvas>
    <div class="ui-controls">
        <div style="display: flex; gap: 20px;"><div id="btnIzq" class="btn">◀</div><div id="btnDer" class="btn">▶</div></div>
        <div id="btnSalto" class="btn">JUMP</div>
    </div>
    <audio id="audioFinal" src="mensaje_sofi.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>

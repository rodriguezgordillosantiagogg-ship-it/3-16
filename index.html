<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lit Killah Adventure - ADSO Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita que la página se mueva */
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #videoContainer {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            border: 5px solid #ffaa00;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
            z-index: 10;
        }
        video {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="videoContainer">
        <video id="videoFinal">
            <source src="video_final.mp4" type="video/mp4">
            Tu navegador no soporta video.
        </video>
    </div>

    <audio id="audioFinal">
        <source src="audio_mensaje.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>

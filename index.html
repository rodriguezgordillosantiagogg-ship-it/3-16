<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lit Killah x Super Mario</title>
    <style>
        /* Estilos básicos para que el juego ocupe toda la pantalla */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* Evita scrolls accidentales */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            display: block;
            /* Mantenemos el aspect ratio o forzamos fullscreen */
            background: #222; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Contenedor del video final - se activa por JS */
        #videoContainer {
            display: none; 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            z-index: 100;
            border: 4px solid #ffaa00;
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="videoContainer">
        <video id="videoFinal">
            <source src="video_final.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="audioFinal">
        <source src="audio_mensaje.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>

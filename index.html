<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lit Killah Adventure - Final</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100vh; width: 100vw; }
        canvas { display: block; image-rendering: pixelated; }
        #videoContainer {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 800px;
            z-index: 1000; border: 4px solid #ffaa00; background: #000;
        }
        video { width: 100%; height: auto; }
        #playButton {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px; font-size: 20px;
            background: #ffaa00; color: #000; border: none; cursor: pointer;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Contenedor de video final -->
    <div id="videoContainer">
        <video id="videoFinal">
            <source src="video_final.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="audioFinal">
        <source src="audio_mensaje.mp3" type="audio/mpeg">
    </audio>

    <!-- Botón para activar interacción en móviles -->
    <button id="playButton">Clic para iniciar juego</button>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lit Killah Cinemático Interactivo</title>
<style>
  body, html { margin:0; padding:0; overflow:hidden; background:#000; height:100vh; width:100vw; }
  canvas { display:block; image-rendering:pixelated; position:absolute; top:0; left:0; }
  #carrusel {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    display:flex; overflow:hidden; width:80%; height:200px; pointer-events:none;
  }
  #carrusel img { height:100%; margin:0 10px; object-fit:cover; border-radius:10px; }
  #videoContainer { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:85%; max-width:800px; z-index:1000; border:4px solid #ffaa00; background:#000; }
  video { width:100%; }
  #uploadFotos { position:fixed; top:10px; left:10px; z-index:2000; }
  #introOverlay {
    position:absolute; top:0; left:0; width:100%; height:100%; background:#000; display:flex;
    flex-direction:column; align-items:center; justify-content:center; color:white; z-index:1000;
  }
  #introOverlay img { width:150px; height:auto; margin-bottom:20px; transition: transform 0.5s; }
  #introText { font-size:24px; margin-bottom:20px; text-align:center; }
  #arrow { font-size:48px; animation: bounce 1s infinite; }
  @keyframes bounce { 0%,100% {transform: translateY(0);} 50% {transform: translateY(-20px);} }
</style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="carrusel"></div>
  <div id="videoContainer">
    <video id="videoFinal"><source src="intro_final.mp4" type="video/mp4"></video>
  </div>
  <audio id="audioFinal"><source src="mensaje_sofi.mp3" type="audio/mpeg"></audio>
  <input type="file" id="uploadFotos" multiple style="z-index:2001;">
  
  <!-- Intro overlay -->
  <div id="introOverlay">
    <img id="caja" src="/mnt/data/430ac6a2-aff4-4dac-9772-08ab05728bdf.png">
    <div id="introText">Coloca las cosas más importantes para ti aquí</div>
    <div id="arrow">⬇️</div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>

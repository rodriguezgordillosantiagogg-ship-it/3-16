<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lit Killah Adventure</title>
    <style>
        /* 1. Reset total: evita que el juego se mueva o tenga bordes blancos */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita el scroll que causa el parpadeo */
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. El Canvas: se adapta a la pantalla */
        canvas {
            display: block;
            image-rendering: pixelated; /* Mantiene nítidos tus sprites */
        }

        /* 3. El Video: oculto hasta que llegues a la meta */
        #videoContainer {
            display: none; 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 800px;
            z-index: 100; /* Asegura que salga POR ENCIMA de Lit */
            border: 4px solid #ffaa00;
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="videoContainer">
        <video id="videoFinal">
            <source src="video_final.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="audioFinal">
        <source src="audio_mensaje.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
</html>
